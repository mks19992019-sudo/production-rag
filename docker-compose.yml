services:

  fast_api:
    build: .
    container_name: agentic_rag
    restart: unless-stopped
    env_file:

      - .env
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
      - redis

    
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_rag
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6343:6334"

    volumes:

      - qdrant_data:/qdrant/storage


  redis:
    image: redis:latest
    container_name: redis_rag
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:

  qdrant_data: